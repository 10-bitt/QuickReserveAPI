<!DOCTYPE html>
<html>
<head>
    <title>QuickReserve</title>
</head>
<body>
    <h1>Users</h1>
    <ul id="users"></ul>

    <script>
        fetch("http://127.0.0.1:8000/api/users/")
        .then(res => res.json())
        .then(data => {
            const list = document.getElementById("users");
            data.forEach(user => {
                list.innerHTML += `<li>${user.name} (${user.email})</li>`;
            });
        });
    </script>
</body>
</html>
